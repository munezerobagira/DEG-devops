services:
  order-service:
    build: ./order-service
    env_file: .env
    environment:
      - PORT=3001
    ports:
      - "${ORDER_PORT}:3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    networks:
      - watchtower-net

  tracking-service:
    build: ./tracking-service
    env_file: .env
    environment:
      - PORT=3002
    ports:
      - "${TRACKING_PORT}:3002"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    networks:
      - watchtower-net

  notification-service:
    build: ./notification-service
    env_file: .env
    environment:
      - PORT=3003
    ports:
      - "${NOTIFICATION_PORT}:3003"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    networks:
      - watchtower-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:9090"
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - watchtower-net

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    ports:
      - "9115:9115"
    networks:
      - watchtower-net

  grafana:
    image: grafana/grafana:latest
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    networks:
      - watchtower-net

networks:
  watchtower-net:
