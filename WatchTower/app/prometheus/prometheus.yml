global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:3001"]

  - job_name: "tracking-service"
    static_configs:
      - targets: ["tracking-service:3002"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:3003"]

  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://order-service:3001/health
          - http://tracking-service:3002/health
          - http://notification-service:3003/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
